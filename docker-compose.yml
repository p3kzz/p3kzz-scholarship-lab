services:
  mysql:
    image: mysql:8
    container_name: scholarship_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scholarship_lab

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: scholarship_backend

    ports:
      - "3000:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      - mysql

    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/scholarship_lab"
      JWT_SECRET: "supersecret"

volumes:
  mysql_data:
